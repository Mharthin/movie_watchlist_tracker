<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist - Movie Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>My Watchlist</h1>
                <div class="status-counters">
                    <div class="status-counter">
                        <span class="counter-label">Want to Watch</span>
                        <span class="counter-value" id="countWant">0</span>
                    </div>
                    <div class="status-counter">
                        <span class="counter-label">Watching</span>
                        <span class="counter-value" id="countWatching">0</span>
                    </div>
                    <div class="status-counter">
                        <span class="counter-label">Watched</span>
                        <span class="counter-value" id="countWatched">0</span>
                    </div>
                </div>
            </div>
            <div class="movie-count-badge">
                <span id="movieCount">0</span>
                <span class="badge-label">movies</span>
            </div>
        </header>

        <!-- Add Movie Form -->
        <section class="add-movie-section">
            <div class="form-group">
                <label for="movieTitle">Movie Title</label>
                <input 
                    type="text" 
                    id="movieTitle" 
                    placeholder="Enter movie title..."
                    class="input-field"
                >
            </div>

            <div class="form-group">
                <label for="movieStatus">Status</label>
                <select id="movieStatus" class="dropdown">
                    <option value="Want to Watch">Want to Watch</option>
                    <option value="Watching">Watching</option>
                    <option value="Watched">Watched</option>
                </select>
            </div>

            <div class="form-group">
                <label for="movieRating">Rating</label>
                <div class="star-rating">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                    <span id="ratingDisplay" class="rating-display">(0 stars)</span>
                </div>
            </div>

            <button id="addMovieBtn" class="add-button">Add Movie</button>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Want to Watch">Want to Watch</button>
                <button class="filter-btn" data-filter="Watched">Watched</button>
            </div>
        </section>

        <!-- Movies Display -->
        <section class="movies-section">
            <div id="moviesContainer" class="movies-container">
                <!-- Movie cards will be added here -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
